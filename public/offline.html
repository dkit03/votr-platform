<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOTR — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0A0E1A;
            color: #F8FAFC;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            text-align: center;
        }
        .logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }
        .logo .v { color: #FFB800; }
        .icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        p {
            color: #94A3B8;
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 320px;
        }
        .retry-btn {
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255, 184, 0, 0.1);
            color: #FFB800;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .retry-btn:hover {
            background: rgba(255, 184, 0, 0.2);
            transform: scale(1.02);
        }
        .retry-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="logo"><span class="v">V</span>OTR</div>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Connect to the internet to vote for your Road March song. Your vote matters!</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
